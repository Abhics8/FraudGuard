name: FraudGuard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_full.txt
        pip install black flake8 isort
        
    - name: Lint with Flake8
      run: |
        flake8 src tests app.py train.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src tests app.py train.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Format Check with Black
      run: |
        black --check src tests app.py train.py
        
    - name: Run Tests with Pytest
      run: |
        pytest tests/ --cov=src --cov-report=xml
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Dry Run Docker Build
      run: |
        docker build -t fraudguard-api:test .
